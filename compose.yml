services:
  app:
    build: .
    ports:
      - 8080:8080
      - 8081:8081
    environment:
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=minio123
      - S3_SERVICE_URL=http://s3:9000
      - S3_BUCKET_NAME=ical2s3grpc
      - S3_REGION=us-east-1
      - S3_USE_HTTPS=false
      - S3_FORCE_PATH_STYLE=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=ical2s3grpc
    depends_on:
      s3:
        condition: service_healthy
      s3-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_healthy
  
  app-healthcheck:
    image: curlimages/curl:latest@sha256:b066cbf876d50a5d024927878a586c4a39c985325ded195e2e231f4abdddf3c8
    command: ["sleep", "infinity"]
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://app:8081/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  s3:
    image: quay.io/minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=minio123
    ports:
      - 9000:9000
      - 9001:9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    command:
      - server
      - /data
      - --console-address
      - ":9001"

  s3-init:
    image: quay.io/minio/mc:latest@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    entrypoint:
      - /bin/sh
    command:
      - -c
      - mc alias set minio http://s3:9000 admin minio123 && mc mb minio/ical2s3grpc || true
    depends_on:
      s3:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:latest@sha256:ab6f1a1f0fb49ea08bcd19f6b84f6081d0d44b364b6de148e1798eb5816bacac
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
